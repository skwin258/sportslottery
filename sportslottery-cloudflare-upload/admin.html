<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FakeSport 設定管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#222;font-size:14px}
header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.05rem;font-weight:700;letter-spacing:.02em}
header nav{display:flex;align-items:center;gap:8px}
header nav a{color:#9ab;text-decoration:none;font-size:.82rem;padding:5px 10px;border-radius:5px;transition:background .15s}
header nav a:hover{background:rgba(255,255,255,.1);color:#fff}
.admin-user{display:flex;align-items:center;gap:8px;margin-left:8px;padding-left:12px;border-left:1px solid rgba(255,255,255,.18)}
.admin-user-name{font-size:.8rem;color:#fff;font-weight:700}
.admin-logout{background:#dc3545;color:#fff;border:0;border-radius:6px;padding:6px 10px;font-size:.78rem;font-weight:700;cursor:pointer}
.admin-logout:hover{opacity:.86}
.container{max-width:1150px;margin:20px auto;padding:0 16px 80px;display:flex;flex-direction:column}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f0f0}
.card-header h2{font-size:.92rem;font-weight:700;color:#333}
.balance-row{display:flex;gap:12px;align-items:center}
.balance-row input{width:240px;padding:8px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:.95rem}
.balance-row input:focus{outline:none;border-color:#0d6efd}
.balance-hint{color:#999;font-size:.79rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;background:#f8f9fa;font-size:.77rem;font-weight:700;color:#555;border-bottom:2px solid #eee;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f3f3f3;vertical-align:middle}
tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-open{background:#fff3cd;color:#7d5a00}
.badge-won{background:#d1e7dd;color:#0a4027}
.badge-lost{background:#f8d7da;color:#6e1219}
.ms{display:inline-block;font-size:.72rem;font-weight:600;padding:2px 7px;border-radius:4px;margin:2px 2px 2px 0;white-space:nowrap}
.ms-won{color:#198754;background:#e8f7ef}
.ms-lost{color:#dc3545;background:#fde8ea}
.ms-live{color:#0d6efd;background:#e8f0fe}
.ms-pending{color:#6c757d;background:#f0f0f0}
.btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-primary{background:#0d6efd;color:#fff}
.btn-success{background:#198754;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.btn-ghost{background:#ebebeb;color:#333}
.btn-sm{padding:4px 10px;font-size:.75rem}
.action-bar{display:flex;gap:8px;margin-bottom:12px}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:12px 24px;display:flex;gap:10px;justify-content:flex-end;box-shadow:0 -2px 8px rgba(0,0,0,.06);z-index:50}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;width:660px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-hd{position:sticky;top:0;background:#fff;padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;z-index:2}
.modal-hd h3{font-size:.92rem;font-weight:700}
.modal-bd{padding:18px 20px}
.modal-ft{position:sticky;bottom:0;background:#fff;padding:14px 20px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;z-index:2}
.form-group{margin-bottom:13px}
label.fl{display:block;font-size:.77rem;font-weight:700;color:#555;margin-bottom:4px}
input.fi,select.fi{width:100%;padding:7px 10px;border:1.5px solid #ddd;border-radius:7px;font-size:.875rem}
input.fi:focus,select.fi:focus{outline:none;border-color:#0d6efd}
input.fi:disabled{background:#f5f5f5;color:#aaa}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.leg-box{background:#f7f8fa;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #eee}
.leg-box h4{font-size:.76rem;color:#888;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.divider{border:none;border-top:1px solid #eee;margin:4px 0 14px}
.toast{position:fixed;bottom:72px;right:24px;color:#fff;padding:11px 18px;border-radius:8px;font-size:.83rem;display:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);font-weight:600}
.empty-state{text-align:center;padding:36px 0;color:#bbb;font-size:.88rem}
.row-drag{cursor:grab}
.amt{font-size:.8rem;color:#888}
#bet-card{order:2}
#schedule-card{order:3}
#account-admin-card{order:1;display:none}
.account-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.account-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f8f9fa;border:1px solid #eee;border-radius:8px;font-weight:700}
.account-toggle input{width:18px;height:18px}
</style>
</head>
<body>
<header>
  <h1>⚙ FakeSport 設定管理</h1>
  <nav>
    <a href="index.html">→ 首頁</a>
    <a href="mybet.html">→ 我的投注</a>
    <a href="schedule.html">→ 賽程</a>
    <span class="admin-user">
      <span class="admin-user-name" id="admin-user-label"></span>

</header>

<div class="container">

  <!-- 帳戶餘額 -->
  <div class="card">
    <div class="card-header">
      <h2>帳戶餘額</h2>
    </div>
    <div class="balance-row">
      <input type="number" id="inp-balance" placeholder="1234567" min="0" step="1" style="width:200px">
      <span class="balance-hint">顯示於首頁及我的投注頁頭部</span>
    </div>
  </div>

  <div class="card" id="account-admin-card">
    <div class="card-header">
      <h2>帳號管理</h2>
    </div>
    <div class="account-grid" id="account-admin-list"></div>
  </div>

  <!-- 賽程管理 -->
  <div class="card" id="schedule-card">
    <div class="card-header">
      <h2>賽程管理</h2>
      <button class="btn btn-primary" onclick="openSchedModal()">＋ 新增賽事</button>
    </div>
    <div class="action-bar">
      <div style="display:flex;align-items:center;gap:8px">
        <label class="fl" style="margin:0;white-space:nowrap">顯示天數</label>
        <input type="number" id="inp-sched-days" min="1" max="30" value="7" style="width:70px;padding:6px 8px;border:1.5px solid #ddd;border-radius:7px;font-size:.875rem">
      </div>
      <button class="btn btn-ghost btn-sm" onclick="clearSchedEvents()">清除全部賽事</button>
      <button class="btn btn-ghost btn-sm" onclick="loadDefaultSched()">載入預設賽事</button>
    </div>
    <div style="overflow-x:auto">
      <table>

            <th style="width:60px">天數偏移</th>
            <th style="width:68px">時間</th>
            <th style="width:60px">賽事編號</th>
            <th style="width:40px">最低</th>
            <th>主場隊</th>
            <th>客場隊</th>
            <th style="width:140px">主場 / 和局 / 客場</th>
            <th style="width:96px">操作</th>
          </tr>
        </thead>
        <tbody id="sched-tbody"></tbody>
      </table>
      <div id="sched-empty" class="empty-state" style="display:none">尚無賽事，點擊「新增賽事」開始</div>
    </div>
  </div>

  <!-- 投注記錄 -->
  <div class="card" id="bet-card">
    <div class="card-header">
      <h2>投注記錄 <span id="bet-count" style="color:#bbb;font-weight:400;font-size:.82rem"></span></h2>

        <button class="btn btn-primary" onclick="openModal()">＋ 新增投注</button>

    </div>
    <div class="action-bar">

</div>

    <div class="modal-hd">
      <h3 id="modal-title">新增投注</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕ 關閉</button>
    </div>
    <div class="modal-bd">

        <div class="form-group">
          <label class="fl">投注類型</label>

            <option value="兩關">兩關</option>
            <option value="三關">三關</option>
            <option value="四關">四關</option>
            <option value="五關">五關</option>
            <option value="六關">六關</option>
            <option value="七關">七關</option>
            <option value="八關">八關</option>
            <option value="九關">九關</option>
            <option value="十關">十關</option>
          </select>
        </div>

          <input type="date" class="fi" id="m-date">

      </div>

        <div class="form-group">
          <label class="fl">狀態</label>

<script>
var SF_KEY  = 'sf_config';
var SF_SCHED_KEY = 'sf_schedule';
var editIdx = -1;
var schedEditIdx = -1;
var config  = { balance: 'NTD 1,234,567', bets: [] };
var schedConfig = { days: 7, events: [] };

function sharedApiAvailable(){
  return location.protocol.indexOf('http') === 0;
}

function syncLocalStorage(){
  localStorage.setItem(SF_KEY, JSON.stringify(config));
  localStorage.setItem(SF_SCHED_KEY, JSON.stringify(schedConfig));
}

function applySharedData(data){
  if(!data) return;
  if(data.sf_config) config = data.sf_config;
  if(data.sf_schedule) schedConfig = data.sf_schedule;
  syncLocalStorage();
}

async function loadSharedData(){
  if(!sharedApiAvailable()) return false;
  try{
    var res = await fetch('/api/storage', {cache:'no-store'});
    if(!res.ok) return false;
    var data = await res.json();
    applySharedData(data);
    return !!(data && (data.sf_config || data.sf_schedule));
  }catch(e){
    return false;
  }
}

async function saveSharedData(){
  syncLocalStorage();
  return sharedApiAvailable();
}

var MANAGED_ACCOUNTS = ['sk1201','sk1203','sk1205','sk1207'];
var disabledAccounts = {};

function currentUser(){
  return localStorage.getItem('sf_active_user') || '';
}

function renderCurrentUser(){
  var label = document.getElementById('admin-user-label');
  if(label) label.textContent = currentUser() || '未登入';
}

function logoutEverywhere(){
  if(window.sfLogoutEverywhere){
    window.sfLogoutEverywhere();
    return;
  }
  localStorage.removeItem('sf_active_user');
  localStorage.removeItem('sf_config');
  localStorage.removeItem('sf_schedule');
  location.reload();
}

async function loadDisabledAccounts(){
  try{
    var res = await fetch('/__shared_storage/state', {cache:'no-store'});
    if(!res.ok) return {};
    var data = await res.json();
    return data.sf_disabled_accounts ? JSON.parse(data.sf_disabled_accounts) : {};
  }catch(e){
    return {};
  }
}

async function saveDisabledAccounts(){
  await fetch('/__shared_storage/state', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      clientId: 'admin-account-manager',
      key: 'sf_disabled_accounts',
      value: JSON.stringify(disabledAccounts)
    })
  });
}

async function renderAccountAdmin(){
  if(currentUser() !== 'koko85830') return;
  disabledAccounts = await loadDisabledAccounts();
  var card = document.getElementById('account-admin-card');
  var list = document.getElementById('account-admin-list');
  card.style.display = 'block';
  list.innerHTML = MANAGED_ACCOUNTS.map(function(account){
    var checked = disabledAccounts[account] ? ' checked' : '';
    return '<label class="account-toggle"><span>'+account+'</span><span style="font-size:.78rem;color:#777">停用 <input type="checkbox" data-account="'+account+'"'+checked+'></span></label>';
  }).join('');
  list.querySelectorAll('input[data-account]').forEach(function(input){
    input.addEventListener('change', async function(){
      var account = input.getAttribute('data-account');
      if(input.checked) disabledAccounts[account] = true;
      else delete disabledAccounts[account];
      await saveDisabledAccounts();
      toast(account + (input.checked ? ' 已停用' : ' 已啟用'));
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatNum(n){
  var num = parseInt(String(n).replace(/[^0-9]/g,'')) || 0;
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function stripNum(s){
  return parseInt(String(s).replace(/[^0-9]/g,'')) || 0;
}

var TYPE_COUNT = {'單關':1,'兩關':2,'三關':3,'四關':4,'五關':5,'六關':6,'七關':7,'八關':8,'九關':9,'十關':10};
function legCountOf(type){ return TYPE_COUNT[type] || (type && type.legs ? type.legs.length : 1); }

function onTypeChange(){
  buildLegs(document.getElementById('m-type').value, null);
}

function onStatusChange(){
  var s = document.getElementById('m-status').value;
  var ri = document.getElementById('m-returns');
  ri.disabled = (s === 'lost');
  if(s === 'lost') ri.value = '0';
  else autoCalcReturns();
}

function autoCalcReturns(){
  var status = document.getElementById('m-status').value;
  var returnsInput = document.getElementById('m-returns');
  if(status === 'lost'){
    returnsInput.value = '0';
    return;
  }
  var stake = parseFloat(document.getElementById('m-stake').value || '0');
  if(!stake) return;
  var totalOdds = 1;
  var validCount = 0;
  document.querySelectorAll('.leg-odds').forEach(function(input){
    var odds = parseFloat(String(input.value).replace(',', '.'));
    if(odds > 0){
      totalOdds *= odds;
      validCount++;
    }
  });
  if(!validCount) return;
  returnsInput.value = String(Math.round(stake * totalOdds));
}

var LEAGUES = ['NBA','MLB','CBA','NPB','KBL','EPL','La Liga','Serie A','2026世界盃'];
var MARKETS = ['勝負','不讓分','讓分','大小分','正確比數'];
var MS_OPTS = [{v:'pending',l:'未開始'},{v:'live',l:'進行中'},{v:'won',l:'已贏'},{v:'lost',l:'已輸'}];

function buildLegs(type, existing){
  var n = legCountOf(type);
  var c = document.getElementById('legs-container');
  c.innerHTML = '';
  for(var i=0;i<n;i++){
    var leg = (existing && existing[i]) ? existing[i]
      : {team:'',event:'',league:'NBA',market:'勝負',odds:'',eventCode:'',matchStatus:'pending'};
    if(!leg.date) leg.date = (document.getElementById('m-date').value || '').replace(/-/g,'/');
    c.insertAdjacentHTML('beforeend', legHtml(i, leg));
  }
}

  var mkOpts = MARKETS.map(function(m){ return '<option'+(leg.market===m?' selected':'')+'>'+m+'</option>'; }).join('');
  var msOpts = MS_OPTS.map(function(o){ return '<option value="'+o.v+'"'+(leg.matchStatus===o.v?' selected':'')+'>'+o.l+'</option>'; }).join('');

        +'<input type="text" class="fi leg-event" data-i="'+i+'" placeholder="如：勇士 @ 湖人" value="'+esc(leg.event)+'"></div>'
    +'</div>'
    +'<div class="fr3">'
      +'<div class="form-group"><label class="fl">場次日期</label>'
        +'<input type="date" class="fi leg-date" data-i="'+i+'" value="'+esc(legDate)+'"></div>'
      +'<div class="form-group"><label class="fl">聯盟</label>'
        +'<select class="fi leg-league" data-i="'+i+'">'+lgOpts+'</select></div>'
      +'<div class="form-group"><label class="fl">玩法</label>'
        +'<select class="fi leg-market" data-i="'+i+'">'+mkOpts+'</select></div>'
      +'<div class="form-group"><label class="fl">賠率</label>'
        +'<input type="text" class="fi leg-odds" data-i="'+i+'" placeholder="1.95" value="'+esc(leg.odds)+'" oninput="autoCalcReturns()"></div>'
    +'</div>'
    +'<div class="fr2">'
      +'<div class="form-group"><label class="fl">比賽狀態</label>'
        +'<select class="fi leg-ms" data-i="'+i+'">'+msOpts+'</select></div>'
      +'<div class="form-group"><label class="fl">賽事編號（自行填寫）</label>'
        +'<input type="text" class="fi leg-eventcode" data-i="'+i+'" placeholder="自行填寫" value="'+esc(leg.eventCode)+'"></div>'
    +'</div>'
  +'</div>';
}

function readLegs(){
  var type = document.getElementById('m-type').value;
  var n = legCountOf(type);
  var existingLegs = (editIdx >= 0 && config.bets[editIdx]) ? config.bets[editIdx].legs : null;
  var legs = [];
  for(var i=0;i<n;i++){
    var ecode = q('.leg-eventcode[data-i="'+i+'"]').value.trim();
    var existingLeg = existingLegs && existingLegs[i];
    legs.push({
      team:   q('.leg-team[data-i="'+i+'"]').value.trim(),
      event:  q('.leg-event[data-i="'+i+'"]').value.trim(),
      league: q('.leg-league[data-i="'+i+'"]').value,
      market: q('.leg-market[data-i="'+i+'"]').value,
      date:   (q('.leg-date[data-i="'+i+'"]').value || document.getElementById('m-date').value).replace(/-/g,'/'),
      odds:   q('.leg-odds[data-i="'+i+'"]').value.trim(),
      eventCode: ecode,
      betId:  (existingLeg && existingLeg.betId) || String(100000000+Math.floor(Math.random()*900000000)),
      matchStatus: q('.leg-ms[data-i="'+i+'"]').value
    });
  }
  return legs;
}

function saveBet(){
  var date  = document.getElementById('m-date').value;
  var stakeRaw = document.getElementById('m-stake').value;
  if(!date || !stakeRaw){ toast('請填寫日期和投注金額', true); return; }
  var status = document.getElementById('m-status').value;
  var legs = readLegs();
  var existingBet = (editIdx >= 0) ? config.bets[editIdx] : null;
  var sharedCode = (existingBet && existingBet.legs && existingBet.legs[0] && existingBet.legs[0].betCode)
    || String(100000000+Math.floor(Math.random()*900000000));
  legs.forEach(function(l){ l.betCode = sharedCode; });
  var bet = {
    type:    document.getElementById('m-type').value,
    date:    date.replace(/-/g,'/'),
    stake:   formatNum(stakeRaw),
    returns: status === 'lost' ? '0' : formatNum(document.getElementById('m-returns').value || '0'),
    status:  status,
    legs:    legs
  };
  if(editIdx >= 0){ config.bets[editIdx] = bet; }
  else { config.bets.unshift(bet); }
  renderTable();
  saveSharedData();
  closeModal();
  toast(editIdx >= 0 ? '投注已更新並同步' : '投注已新增並同步');
}

function splitImportCells(line){
  if(line.indexOf('\t') >= 0) return line.split('\t').map(function(c){ return c.trim(); });
  if(line.indexOf(',') >= 0) return line.split(',').map(function(c){ return c.trim(); });
  return line.trim().split(/\s+/);
}

function normalizeImportDate(value){
  value = String(value || '').trim().replace(/-/g,'/');
  var m;
  if((m = value.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/))){
    return m[1] + '/' + m[2].padStart(2,'0') + '/' + m[3].padStart(2,'0');
  }
  if((m = value.match(/^(\d{1,2})\/(\d{1,2})$/))){
    return new Date().getFullYear() + '/' + m[1].padStart(2,'0') + '/' + m[2].padStart(2,'0');
  }
  return value;
}

function normalizeImportStatus(value){
  var s = String(value || '').trim();
  if(['未開始','未開賽','未派彩','pending'].indexOf(s) >= 0) return 'pending';
  if(['進行中','比賽中','live'].indexOf(s) >= 0) return 'live';
  if(['已贏','贏','中獎','won'].indexOf(s) >= 0) return 'won';
  if(['已輸','輸','未中獎','lost'].indexOf(s) >= 0) return 'lost';
  return 'pending';
}

function typeFromLegCount(count){
  return ['','單關','兩關','三關','四關','五關','六關','七關','八關','九關','十關'][count] || '單關';
}

function parseLooseLegLine(cells){
  var dateIdx = -1;
  for(var i=1;i<cells.length;i++){
    if(/^\d{1,4}[/-]\d{1,2}([/-]\d{1,2})?$/.test(cells[i])){ dateIdx = i; break; }
  }
  if(dateIdx < 0 || cells.length < dateIdx + 6) return null;
  var beforeDate = cells.slice(1, dateIdx);
  var atIdx = beforeDate.indexOf('@');
  var eventStart = atIdx > 0 ? atIdx - 1 : Math.max(1, beforeDate.length - 2);
  return {
    team: beforeDate.slice(0, eventStart).join(' '),
    event: beforeDate.slice(eventStart).join(' '),
    date: normalizeImportDate(cells[dateIdx]),
    league: cells[dateIdx + 1],
    market: cells[dateIdx + 2],
    odds: cells[dateIdx + 3],
    matchStatus: normalizeImportStatus(cells[dateIdx + 4]),
    eventCode: cells[dateIdx + 5]
  };
}

function parseImportLeg(cells){
  if(cells.length >= 9){
    return {
      team: cells[1],
      event: cells[2],
      date: normalizeImportDate(cells[3]),
      league: cells[4],
      market: cells[5],
      odds: cells[6],
      matchStatus: normalizeImportStatus(cells[7]),
      eventCode: cells[8]
    };
  }
  return parseLooseLegLine(cells);
}

function parseBlockImport(lines){
  var first = lines[0].trim().split(/\s+/);
  if(first.length < 2) return null;
  var betType = first[0];
  var betDate = normalizeImportDate(first[1]);
  var legs = [];
  for(var i=1;i<lines.length;i++){
    if(!/^第\d+場$/.test(lines[i].trim())) continue;
    var values = [];
    for(var j=i+1;j<lines.length && !/^第\d+場$/.test(lines[j].trim());j++){
      var value = lines[j].trim();
      if(value) values.push(value);
    }
    if(values.length >= 8){
      legs.push({
        team: values[0],
        event: values[1],
        date: normalizeImportDate(values[2]),
        league: values[3],
        market: values[4],
        odds: values[5],
        matchStatus: normalizeImportStatus(values[6]),
        eventCode: values[7]
      });
    }
    i = j - 1;
  }
  return legs.length ? {betType: betType, betDate: betDate, legs: legs} : null;
}

function importBetSheet(){
  var raw = document.getElementById('import-text').value.trim();
  if(!raw){ toast('請先貼上試算表內容', true); return; }
  var lines = raw.split(/\r?\n/).map(function(line){ return line.trim(); }).filter(Boolean);
  var block = parseBlockImport(lines);
  var rows = lines.map(function(line){ return splitImportCells(line); })
    .filter(function(cells){ return cells.length && cells.join('').trim(); });
  if(rows.length < 2){ toast('匯入內容不足', true); return; }

  if(rows[0].join('').indexOf('投注類型') >= 0) {
    rows.shift();
    lines.shift();
    block = parseBlockImport(lines);
  }
  var head = rows.shift();
  var betType = block ? block.betType : (head[0] || '');
  var betDate = block ? block.betDate : normalizeImportDate(head[1] || '');
  var legs = block ? block.legs : rows.map(parseImportLeg).filter(Boolean);

  if(!betType || !betDate || !legs.length){
    toast('格式讀取失敗，請確認欄位順序是否正確', true);
    return;
  }
  if(TYPE_COUNT[betType] !== legs.length) betType = typeFromLegCount(legs.length);

  closeImportModal();
  openModal();
  document.getElementById('modal-title').textContent = '新增投注（試算表匯入）';
  document.getElementById('m-type').value = betType;
  document.getElementById('m-date').value = betDate.replace(/\//g,'-');
  document.getElementById('m-status').value = 'open';
  document.getElementById('m-stake').value = '';
  document.getElementById('m-returns').value = '';
  document.getElementById('m-returns').disabled = false;
  buildLegs(betType, legs);
  autoCalcReturns();
  toast('已匯入到表單，確認後請自行按儲存');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  var el = q('#toast');
  el.textContent = msg;
  el.style.background = isErr ? '#dc3545' : '#198754';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.display='none'; }, 2600);

// ── Schedule CRUD ─────────────────────────────────────────────────────────────
function renderSchedTable(){
  var tbody = document.getElementById('sched-tbody');
  var empty = document.getElementById('sched-empty');
  var evs = schedConfig.events || [];
  if(!evs.length){ tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  tbody.innerHTML = evs.map(function(e,i){
    return '<tr>'
      +'<td style="color:#bbb;font-size:.78rem">'+(i+1)+'</td>'
      +'<td style="text-align:center">+'+e.dayOffset+'天</td>'
      +'<td>'+esc(e.time)+'</td>'
      +'<td style="text-align:center">'+e.eventId+'</td>'
      +'<td style="text-align:center">'+e.minBet+'</td>'
      +'<td>'+esc(e.team1)+'</td>'
      +'<td>'+esc(e.team2)+'</td>'
      +'<td style="font-size:.8rem">'+esc((e.odds||[]).join(' / '))+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="btn btn-ghost btn-sm" onclick="editSchedEvent('+i+')">編輯</button> '
        +'<button class="btn btn-danger btn-sm" onclick="deleteSchedEvent('+i+')">刪除</button>'
      +'</td>'
    +'</tr>';
  }).join('');
}

function openSchedModal(idx){
  schedEditIdx = (idx !== undefined) ? idx : -1;
  document.getElementById('sched-modal-title').textContent = schedEditIdx >= 0 ? '編輯賽事' : '新增賽事';
  if(schedEditIdx >= 0){
    var e = schedConfig.events[schedEditIdx];
    document.getElementById('sm-dayoffset').value = e.dayOffset;
    document.getElementById('sm-time').value = e.time;
    document.getElementById('sm-eventid').value = e.eventId;
    document.getElementById('sm-minbet').value = e.minBet;
    document.getElementById('sm-extra').value = e.extra || 25;
    document.getElementById('sm-team1').value = e.team1;
    document.getElementById('sm-team2').value = e.team2;
    document.getElementById('sm-odds1').value = (e.odds||['','',''])[0];
    document.getElementById('sm-odds2').value = (e.odds||['','',''])[1];
    document.getElementById('sm-odds3').value = (e.odds||['','',''])[2];
  } else {
    document.getElementById('sm-dayoffset').value = 0;
    document.getElementById('sm-time').value = '12:00';
    document.getElementById('sm-eventid').value = '';
    document.getElementById('sm-minbet').value = 1;
    document.getElementById('sm-extra').value = 25;
    document.getElementById('sm-team1').value = '';
    document.getElementById('sm-team2').value = '';
    document.getElementById('sm-odds1').value = '';
    document.getElementById('sm-odds2').value = '';
    document.getElementById('sm-odds3').value = '';
  }
  document.getElementById('sched-modal-bg').classList.add('open');
}

function editSchedEvent(i){ openSchedModal(i); }

function closeSchedModal(){
  document.getElementById('sched-modal-bg').classList.remove('open');
}

function saveSchedEvent(){
  var team1 = document.getElementById('sm-team1').value.trim();
  var team2 = document.getElementById('sm-team2').value.trim();
  if(!team1 || !team2){ toast('請填寫隊名', true); return; }
  var ev = {
    dayOffset: parseInt(document.getElementById('sm-dayoffset').value, 10) >= 0 ? parseInt(document.getElementById('sm-dayoffset').value, 10) : 1,
    time:      document.getElementById('sm-time').value || '12:00',
    eventId:   parseInt(document.getElementById('sm-eventid').value) || Math.floor(1000+Math.random()*9000),
    minBet:    parseInt(document.getElementById('sm-minbet').value) || 1,
    extra:     parseInt(document.getElementById('sm-extra').value) || 25,
    team1:     team1,
    team2:     team2,
    odds:      [
      document.getElementById('sm-odds1').value.trim() || '2.00',
      document.getElementById('sm-odds2').value.trim() || '3.00',
      document.getElementById('sm-odds3').value.trim() || '2.00'
    ]
  };
  if(schedEditIdx >= 0){ schedConfig.events[schedEditIdx] = ev; }
  else { schedConfig.events.push(ev); }
  renderSchedTable();
  saveSharedData();
  closeSchedModal();
  toast(schedEditIdx >= 0 ? '賽事已更新並同步' : '賽事已新增並同步');
}

function deleteSchedEvent(i){
  if(!confirm('確定刪除第 '+(i+1)+' 筆賽事？')) return;
  schedConfig.events.splice(i,1);
  renderSchedTable();
  saveSharedData();
}

function clearSchedEvents(){
  if(!confirm('確定清除全部賽事？')) return;
  schedConfig.events = [];
  renderSchedTable();
  saveSharedData();
}

function loadDefaultSched(){
  if(schedConfig.events.length && !confirm('確定覆蓋現有賽事，載入預設資料？')) return;
  schedConfig.events = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE_EVENTS));
  renderSchedTable();
  saveSharedData();
  toast('已載入預設賽事並同步');
}

load();
